<script>
function analisarDados() {
    const input = document.getElementById('phone-input').value;
    const resultadoDiv = document.getElementById('resultado-analise');
    
    if (input.length < 10) {
        resultadoDiv.innerHTML = "<p style='color:orange;'>⚠️ Digite um número ou Pix completo para analisar.</p>";
        return;
    }

    // LISTA DE DDDs PARA DAR REALISMO
    const ddds = {
        '11': 'São Paulo', '21': 'Rio de Janeiro', '31': 'Minas Gerais', 
        '61': 'Distrito Federal', '66': 'Mato Grosso', '71': 'Bahia'
    };
    
    let ddd = input.substring(0, 2);
    let estado = ddds[ddd] || "Estado não identificado";

    // SE FOR O SEU NÚMERO (Coloque o seu número real aqui para testar)
    if (input.includes("6692388467") || input.includes("66992388467")) {
        resultadoDiv.innerHTML = `
            <div style="background: #d4edda; color: #155724; padding: 15px; border-radius: 10px; border: 2px solid #28a745;">
                <h3>✅ NÚMERO VERIFICADO</h3>
                <p>Este número pertence ao <b>Daniel (Administrador Oficial)</b>.</p>
                <p><b>Status:</b> 100% Seguro</p>
            </div>
        `;
    } else {
        // SIMULAÇÃO DE ANÁLISE PARA OUTROS NÚMEROS
        resultadoDiv.innerHTML = `
            <div style="background: #fff3cd; color: #856404; padding: 15px; border-radius: 10px; border: 2px solid #ffeeba;">
                <h3>🔍 ANALISANDO VIA IA...</h3>
                <p><b>Localização provável:</b> ${estado}</p>
                <p><b>Risco detectado:</b> Médio</p>
                <hr>
                <p>⚠️ <b>DICA DE SEGURANÇA:</b> Antes de fazer o PIX, ligue para a pessoa por vídeo para confirmar a identidade. Golpistas costumam usar números de ${estado} para aplicar fraudes.</p>
            </div>
        `;
    }
}
</script>
