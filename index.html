<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShieldBR v3 - Ultimate</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --roxo: #4B0082; --verde: #00ff00; --fundo: #050505; --card: #121212; --danger: #ff3333; }
        
        body { background: var(--fundo); color: white; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }

        /* Tela de Loading Animada */
        #loading { position: fixed; width: 100%; height: 100%; background: var(--fundo); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; }
        .escudo-load { font-size: 5rem; color: var(--verde); animation: shieldPulse 2s infinite; }

        /* Header Chique */
        .header { text-align: center; padding: 20px; background: var(--card); border-bottom: 1px solid #222; sticky: top; }
        .status-badge { background: rgba(0,255,0,0.1); border: 1px solid var(--verde); color: var(--verde); padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; }

        /* Containers com Transição */
        .container { padding: 15px; display: none; opacity: 0; transform: translateX(20px); transition: 0.4s; }
        .container.active { display: block; opacity: 1; transform: translateX(0); }

        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid #1a1a1a; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* IA e Inputs */
        textarea { width: 100%; background: #0a0a0a; border: 1px solid #333; color: white; padding: 15px; border-radius: 15px; font-size: 1rem; resize: none; outline: none; transition: 0.3s; }
        textarea:focus { border-color: var(--roxo); box-shadow: 0 0 10px rgba(75,0,130,0.5); }
        
        .btn-main { background: linear-gradient(45deg, var(--roxo), #6a0dad); color: white; border: none; padding: 18px; width: 100%; border-radius: 15px; font-weight: bold; font-size: 1rem; cursor: pointer; margin-top: 10px; }

        /* Navegação Profissional */
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: rgba(18,18,18,0.95); backdrop-filter: blur(10px); display: grid; grid-template-columns: repeat(6, 1fr); padding: 12px 0; border-top: 1px solid #222; }
        .nav-item { color: #555; text-align: center; font-size: 0.6rem; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--verde); transform: translateY(-5px); }
        .nav-item i { font-size: 1.3rem; margin-bottom: 4px; display: block; }

        @keyframes shieldPulse { 0% { transform: scale(1); filter: drop-shadow(0 0 0px var(--verde)); } 50% { transform: scale(1.1); filter: drop-shadow(0 0 20px var(--verde)); } 100% { transform: scale(1); filter: drop-shadow(0 0 0px var(--verde)); } }
    </style>
</head>
<body onload="finalizarLoading()">

    <div id="loading">
        <i class="fas fa-shield-halved escudo-load"></i>
        <p style="margin-top: 20px; letter-spacing: 2px;">SHIELDBR <span style="color:var(--verde)">V3</span></p>
    </div>

    <div class="header">
        <span class="status-badge"><i class="fas fa-circle" style="font-size:0.5rem"></i> SISTEMA ONLINE</span>
        <h2 style="margin:10px 0 0 0;">ShieldBR <span style="color:var(--roxo)">PRO</span></h2>
    </div>

    <div id="aba-analisar" class="container active">
        <div class="card">
            <h3>🔍 Multi-Escaneador IA</h3>
            <p style="color:#666; font-size:0.8rem">Analise CNPJ, Links, CPF ou Conversas Suspeitas</p>
            <textarea id="inputIA" rows="5" placeholder="Cole qualquer coisa suspeita aqui..."></textarea>
            <button class="btn-main" onclick="analisarCompleto()">INICIAR ANÁLISE PROFISSIONAL</button>
            <div id="resIA" style="margin-top:20px; display:none; padding:15px; background:rgba(0,255,0,0.05); border-radius:10px; border-left:4px solid var(--verde);"></div>
        </div>
        
        <div class="card" style="text-align:center; border: 1px solid #300;">
            <button class="btn-main" style="background:var(--danger); animation: pulse 1.5s infinite;" onclick="alert('PARE! Não transfira valores. Ligue para o seu banco agora!')">🆘 SOS ANTIGOLPE</button>
        </div>
    </div>

    <div id="aba-stats" class="container">
        <div class="card">
            <h3>📊 Radar de Crimes Cibernéticos</h3>
            <canvas id="chartGeral"></canvas>
        </div>
    </div>

    <div id="aba-tools" class="container">
        <div class="card" onclick="celebrar()">
            <h3>🎁 Teste de Segurança</h3>
            <p>Clique aqui para simular um acerto no Quiz!</p>
        </div>
    </div>

    <nav class="nav-bottom">
        <div class="nav-item active" onclick="mudarAba('aba-analisar', this)"><i class="fas fa-bolt"></i>IA</div>
        <div class="nav-item" onclick="mudarAba('aba-stats', this)"><i class="fas fa-chart-pie"></i>Radar</div>
        <div class="nav-item" onclick="mudarAba('aba-tools', this)"><i class="fas fa-toolbox"></i>Tools</div>
        <div class="nav-item"><i class="fas fa-users"></i>Mural</div>
        <div class="nav-item"><i class="fas fa-book"></i>Guia</div>
        <div class="nav-item"><i class="fas fa-crown"></i>Premium</div>
    </nav>

    <script>
        const API_KEY = "AIzaSyAnNpgyAP0MOCuKvFvv3g91_RENe6lGDEo";

        function finalizarLoading() {
            setTimeout(() => {
                document.getElementById('loading').style.opacity = '0';
                setTimeout(() => document.getElementById('loading').style.display = 'none', 500);
            }, 1500);
        }

        function mudarAba(id, el) {
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            if(id === 'aba-stats') initChart();
        }

        async function analisarCompleto() {
            const txt = document.getElementById('inputIA').value;
            const res = document.getElementById('resIA');
            if(!txt) return;

            res.style.display = "block";
            res.innerHTML = "🛡️ <b>ShieldBR:</b> Escaneando metadados e reputação...";

            // PROMPT PARA IDOSOS + RESUMO EM 1 FRASE
            const promptMestre = `Aja como um analista de segurança digital. 
            Analise: "${txt}". 
            1. Dê um resumo de 1 frase no início (ex: "Isso é um golpe de falso boleto").
            2. Explique o perigo em linguagem bem simples para um idoso entender.
            3. Informe o veredito: SEGURO ou PERIGO.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: promptMestre }] }] })
                });
                const data = await response.json();
                res.innerHTML = "<b>ANÁLISE FINALIZADA:</b><br><br>" + data.candidates[0].content.parts[0].text;
            } catch (e) { res.innerHTML = "Erro na conexão."; }
        }

        function celebrar() {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#00ff00', '#4B0082'] });
        }

        function initChart() {
            const ctx = document.getElementById('chartGeral').getContext('2d');
            if(window.myChart) window.myChart.destroy();
            window.myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Jan', 'Fev', 'Mar', 'Abr'],
                    datasets: [{ label: 'Golpes Bloqueados', data: [1200, 1900, 1500, 2800], borderColor: '#00ff00', tension: 0.4 }]
                }
            });
        }
    </script>
</body>
</html>
