<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShieldBR PRO | Central de Inteligência</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        :root { --neon: #00ff41; --dark: #0a0a0a; --purple: #8a2be2; --card: #151515; --blue: #00d4ff; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 100px; }
        
        .header { background: #000; padding: 25px; text-align: center; border-bottom: 2px solid var(--purple); box-shadow: 0 4px 20px rgba(138, 43, 226, 0.3); }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        
        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid #222; }
        .card-title { color: var(--purple); font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; text-transform: uppercase; font-size: 0.9rem; }

        input, textarea { width: 100%; background: #000; border: 1px solid #333; color: var(--neon); padding: 15px; border-radius: 12px; margin-bottom: 15px; box-sizing: border-box; font-size: 1rem; outline: none; }
        input:focus { border-color: var(--purple); }

        /* GRADE DE BOTÕES */
        .grid-tools { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .btn-tool { background: #1a1a1a; border: 1px solid #333; color: #ccc; padding: 15px; border-radius: 12px; font-size: 0.75rem; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .btn-tool i { font-size: 1.2rem; color: var(--blue); }
        .btn-tool:hover { border-color: var(--neon); color: var(--neon); background: #000; }
        .btn-tool.active { border-color: var(--purple); color: white; background: #222; box-shadow: 0 0 10px rgba(138, 43, 226, 0.4); }

        .btn-execute { width: 100%; padding: 20px; border-radius: 15px; border: none; background: linear-gradient(90deg, #4b0082, #8a2be2); color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        
        #res { display: none; margin-top: 20px; padding: 20px; border-radius: 15px; border: 1px solid var(--neon); background: #000; color: #fff; font-size: 0.9rem; line-height: 1.6; }
        
        #preview-img { width: 100%; border-radius: 12px; display: none; margin-bottom: 15px; border: 1px solid #333; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #222; z-index: 100; }
        .nav-item { color: #555; text-align: center; font-size: 0.7rem; cursor: pointer; }
        .nav-item.active { color: var(--neon); }
    </style>
</head>
<body>

    <div class="header">
        <div style="color: var(--neon); font-size: 0.7rem; font-weight: bold; letter-spacing: 2px;">● SISTEMA OPERACIONAL ATIVO</div>
        <h1 style="margin:5px 0 0; font-size: 1.8rem;">ShieldBR <span style="color: var(--purple);">PRO</span></h1>
    </div>

    <div class="container">
        <div class="card">
            <div class="card-title"><i class="fas fa-shield-virus"></i> Painel de Investigação</div>
            
            <img id="preview-img" src="">
            
            <input type="text" id="mainInput" placeholder="Selecione uma ferramenta abaixo...">
            <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="handleFile(event)">

            <div class="grid-tools">
                <button class="btn-tool" onclick="setMode('print')"><i class="fas fa-camera"></i> Analisar Print</button>
                <button class="btn-tool" onclick="setMode('pix')"><i class="fas fa-money-bill-wave"></i> Pix / CPF / CNPJ</button>
                <button class="btn-tool" onclick="setMode('boleto')"><i class="fas fa-barcode"></i> Analisar Boleto</button>
                <button class="btn-tool" onclick="setMode('link')"><i class="fas fa-link"></i> Verificar Link</button>
                <button class="btn-tool" onclick="setMode('ddd')"><i class="fas fa-map-marker-alt"></i> Rastrear DDD</button>
                <button class="btn-tool" onclick="setMode('conversa')"><i class="fas fa-comments"></i> Ler Conversa</button>
            </div>
            
            <button class="btn-execute" onclick="runAI()">INICIAR VARREDURA PRO</button>
            
            <div id="res"></div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active"><i class="fas fa-microchip"></i><br>IA</div>
        <div class="nav-item"><i class="fas fa-broadcast-tower"></i><br>Radar</div>
        <div class="nav-item"><i class="fas fa-tools"></i><br>Tools</div>
        <div class="nav-item"><i class="fas fa-graduation-cap"></i><br>Guia</div>
        <div class="nav-item"><i class="fas fa-star"></i><br>Pro</div>
    </div>

    <script>
        const API_KEY = "AIzaSyALrqcdO4JYfwdXl3eO-YQQJcwpqOxzHxc";
        let mode = "geral";

        function setMode(m) {
            mode = m;
            document.querySelectorAll('.btn-tool').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            const input = document.getElementById('mainInput');
            input.style.display = "block";
            document.getElementById('preview-img').style.display = "none";

            if(m === 'print') {
                document.getElementById('fileInput').click();
                input.placeholder = "Aguardando imagem do print...";
            } else if(m === 'ddd') input.placeholder = "Digite o número com DDD...";
            else if(m === 'pix') input.placeholder = "Chave Pix, CPF ou CNPJ...";
            else if(m === 'boleto') input.placeholder = "Cole a linha digitável do boleto...";
            else if(m === 'link') input.placeholder = "Cole o link suspeito aqui...";
            else if(m === 'conversa') input.placeholder = "Cole trechos da conversa suspeita...";
        }

        function handleFile(e) {
            const reader = new FileReader();
            reader.onload = () => {
                const img = document.getElementById('preview-img');
                img.src = reader.result;
                img.style.display = "block";
                document.getElementById('mainInput').style.display = "none";
            };
            reader.readAsDataURL(e.target.files[0]);
        }

        async function runAI() {
            const out = document.getElementById('res');
            const inputVal = document.getElementById('mainInput').value;
            const imgData = document.getElementById('preview-img').src;

            out.style.display = "block";
            out.innerHTML = "⏳ <b>ACESSANDO PROTOCOLOS DE SEGURANÇA...</b>";

            let prompt = "";
            
            if(mode === 'print') {
                out.innerHTML = "🔍 <b>LENDO TEXTO DA IMAGEM...</b>";
                const rec = await Tesseract.recognize(imgData, 'por');
                prompt = `Analise este print e identifique se há sinais de montagem, golpe de comprovante falso ou engenharia social: ${rec.data.text}`;
            } else if(mode === 'ddd') {
                prompt = `Identifique a localização exata do DDD deste número: ${inputVal}. Verifique se essa região tem histórico de golpes de falsa central ou clonagem de WhatsApp.`;
            } else if(mode === 'pix') {
                prompt = `Analise esta chave (CPF, CNPJ ou Pix): ${inputVal}. Diga o banco de origem se possível e se há padrão de 'conta laranja' ou fraude.`;
            } else if(mode === 'boleto') {
                prompt = `Verifique se este código de boleto é legítimo ou se foi alterado por vírus de linha digitável: ${inputVal}.`;
            } else {
                prompt = `Varredura de segurança para: ${inputVal}. Analise riscos de golpe.`;
            }

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                out.innerHTML = "🛡️ <b>LAUDO TÉCNICO SHIELDBR:</b><br><br>" + data.candidates[0].content.parts[0].text.replace(/\n/g, "<br>");
            } catch (e) {
                out.innerHTML = "❌ Erro na conexão. Verifique sua internet ou chave API.";
            }
        }
    </script>
</body>
</html>
